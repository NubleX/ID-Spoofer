version: 2

project_name: idspoof

before:
  hooks:
    - cmd: go mod tidy
      dir: idspoof

builds:
  - id: idspoof
    main: ./idspoof/cmd/idspoof
    binary: idspoof
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NubleX/idspoof/internal/config.Version={{.Version}}
      - -X github.com/NubleX/idspoof/internal/config.Commit={{.Commit}}
      - -X github.com/NubleX/idspoof/internal/config.BuildDate={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: NubleX
    name: idspoof
  draft: false
  prerelease: auto
  footer: |
    ---
    **Igor Dunaev (NubleX)** · [idarti.com](https://www.idarti.com) · [GitHub](https://github.com/NubleX)

    > Download the binary for your platform above, verify with `checksums.txt`, and run with `sudo`.
