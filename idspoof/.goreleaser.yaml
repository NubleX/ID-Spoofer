version: 2

project_name: idspoof

before:
  hooks:
    - go mod tidy

builds:
  - id: idspoof
    main: ./cmd/idspoof
    binary: idspoof
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NubleX/idspoof/internal/config.Version={{.Version}}
      - -X github.com/NubleX/idspoof/internal/config.Commit={{.Commit}}
      - -X github.com/NubleX/idspoof/internal/config.BuildDate={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - scripts/install.sh

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: NubleX
    name: idspoof
  draft: false
  prerelease: auto
